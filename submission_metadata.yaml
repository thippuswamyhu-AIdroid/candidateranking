# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Multi-variate semantic rule based candidates ranking system with explicit
  reasons for recommending a candidate for a job role. It involves a pre-filtering
  step mainly based on candidate's total years of experience, location / country,
  willingness to relocate, notice period and preferred work mode. Embeddings
  are generated on the fly for the filtered candidate details and 6 scores 
  (based on candidate specific profile, career history, skills, 
  education, language and redrob signals) are computed with the profile score,
  education score, career history score and skills score all involving semantic
  scoring against job role requirements. Pre-identified honeypot candidates
  have been configured and shall be filtered out during the scoring process.
  All the 6 individual scores are then combined through weighted sum to generate
  the final composite relevance score for each candidate. At the end, candidate's
  matching career history details, skills and education details are used for
  generating the reason for recommendation using a local LLM model against
  top 100 candidates only.

